minimum_score: 80
fail_on_blockers: true

require_linked_ticket: true
require_summary: true
require_acceptance_criteria: true
require_test_evidence: true
require_risk: true
require_rollback: true
require_screenshot_for_ui_changes: true

ticket_patterns:
  - "[A-Z]+-[0-9]+"
  - "#[0-9]+"

ui_paths:
  - "lib/**"
  - "app/**"
  - "src/**/*.tsx"
  - "src/**/*.jsx"
  - "src/**/*.dart"
  - "android/**"
  - "ios/**"

placeholder_patterns:
  - "TODO"
  - "FIXME"
  - "temporary"
  - "hack"
  - "stub"
  - "not implemented"
  - "lorem ipsum"
  - "console.log"
  - "debugger"

weights:
  linked_ticket: 10
  summary: 10
  acceptance_criteria: 20
  test_evidence: 20
  risk: 10
  rollback: 10
  screenshots: 10
  placeholders: 10
