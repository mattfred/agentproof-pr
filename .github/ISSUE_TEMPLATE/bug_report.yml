name: Bug report
description: Report something broken or unexpected
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug or unexpected behavior.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant workflow or .agentproof.yml config
      render: yaml
    validations:
      required: false

  - type: textarea
    id: output
    attributes:
      label: AgentProof output
      description: Paste the PR comment, workflow log, or error message.
    validations:
      required: false
