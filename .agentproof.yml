minimum_score: 80
require_linked_ticket: true
require_summary: true
require_acceptance_criteria: true
require_test_evidence: true
require_risk: true
require_rollback: true
require_screenshot_for_ui_changes: false
placeholder_ignore_paths:
  - ".agentproof.yml"
  - ".github/pull_request_template.md"
  - "docs/**"
  - "examples/**"
  - "README.md"
  - "CHANGELOG.md"
  - "test/**"
  - "src/rules/placeholders.ts"
  - "dist/**"
blocking_rules:
  - summary
  - test_evidence
  - acceptance_criteria
